<!Doctype html>
<html>
    <head>
         <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Data Form</title>
    </head>
    <body>
      <form action="#" method="post" enctype="multipart/form-data">
      <label for="name">Name</label><br>
      <input type="text" name="name" placeholder="Enter"><br><br>
      <label for="name">F/H Name </label>
      <select name="F/H Name" id="name">
      <option value="father">Father</option>
      <option value="spouse">Husband</option></select><br>
      <input type="text" name="name" placeholder="Enter"><br><br>
      <label for="dob">DOB</label><br>
      <input type="date" name="dateofbirth" placeholder="Enter"><br><br>
      <label for="gender">Gender</label><br>
      <input type="radio" name="gender" value="Male">Male<br>
      <input type="radio" name="gender" value="Fe-Male">Fe-Male<br><br>
      <label for="country">Country</label><br>
      <input type="text" name="country" placeholder="Enter your country"><br><br>
      <label for="religion">Religion</label><br>
      <select name="Religion" id="religion">
      <option value="islam">Islam</option>
      <option value="other">Other</option></select><br><br>
      <label for="name">Martial Status</label><br>
      <input type="text" name="m.status" placeholder="Enter"><br><br>
      <label for="name">Qualification</label><br>
      <input type="text" name="name" placeholder="Enter"><br>
      <input type="text" name="name" placeholder="Other Qualifications"><br><br>
      <label for="contact">Contact#</label><br>
      <input type="number" name="contact" placeholder="Enter"><br><br>
      <label for="add">Address</label><br>
      <input type="text" name="address" placeholder="Enter Address"><br><br>
      <label for="mail">E-Mail Address</label><br>
      <input type="email" name="add" placeholder="Enter e-mail"><br><br>
      <label for="upload">Upload File</label><br>
      <input type="file" name="filename"><br><br>
      <button type="reset">Clear</button>
      <button type="submit">Submit</button>
      </form>
    </body>
</html>
